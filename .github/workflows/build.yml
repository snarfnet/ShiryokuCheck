name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then sudo xcode-select -s "/Applications/$XCODE_APP"
        else XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1); sudo xcode-select -s "/Applications/$XCODE_APP"; fi
        xcodebuild -version
    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ShiryokuCheck/Info.plist
    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
    - name: Build Archive
      run: |
        xcodebuild archive \
          -project ShiryokuCheck.xcodeproj -scheme ShiryokuCheck \
          -configuration Release -destination "generic/platform=iOS" \
          -archivePath build/ShiryokuCheck.xcarchive \
          CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec
    - name: Export IPA
      run: |
        cat > export_options.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>destination</key><string>export</string>
          <key>teamID</key><string>83VGKGSQUH</string>
        </dict></plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath build/ShiryokuCheck.xcarchive -exportPath build/export \
          -exportOptionsPlist export_options.plist -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec
    - name: Upload IPA
      run: |
        xcrun altool --upload-app \
          -f build/export/ShiryokuCheck.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec
